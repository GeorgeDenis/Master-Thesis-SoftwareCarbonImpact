services:
  postgres:
    image: postgres:16.4-alpine
    container_name: petrescue-postgres
    environment:
      POSTGRES_DB: petrescue
      POSTGRES_USER: petrescue
      POSTGRES_PASSWORD: petrescue
    ports:
      - "5433:5432"
    volumes:
      - petrescue_pg_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "max_connections=300"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petrescue -d petrescue"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: petrescue-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  petrescue_pg_data:
